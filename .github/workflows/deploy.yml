name: Deploy Dev Training

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch or ref to deploy on the EC2 host
        required: false
        default: main
  push:
    branches:
      - main

jobs:
  deploy:
    name: Run provision script on EC2
    runs-on: ubuntu-latest
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_REF: ${{ env.DEPLOY_REF }}
          REPO_PATH: ${{ secrets.EC2_REPO_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          envs: DEPLOY_REF,REPO_PATH
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${REPO_PATH}" ]; then
              echo "EC2_REPO_PATH secret is not set."
              exit 1
            fi

            cd "${REPO_PATH}"

            git fetch --all --prune
            git checkout "${DEPLOY_REF}"
            git pull origin "${DEPLOY_REF}"

            aws sts get-caller-identity

            chmod +x scripts/training/provision-dev-training-from-cloudshell.sh
            ./scripts/training/provision-dev-training-from-cloudshell.sh
